name: Release packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3

      - name: Build packages
        run: scripts/package.sh all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
